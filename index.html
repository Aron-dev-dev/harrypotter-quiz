<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>Harry Potter Quiz</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #1a1a2e;
    color: white;
}
button {
    padding: 10px 20px;
    margin: 8px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}
#vraag { font-size: 22px; margin-top: 25px; }
#antwoord { margin-top: 15px; color: lightgreen; }
#score { margin-top: 20px; }
</style>
</head>

<body>

<h1>🧙 Harry Potter Quiz</h1>
<div id="score">Score: 0 / 0</div>

<button onclick="nieuweVraag()">Nieuwe vraag</button>

<div id="vraag"></div>
<button id="antwoordKnop" onclick="toonAntwoord()" style="display:none;">Toon antwoord</button>
<div id="antwoord"></div>

<br>
<button onclick="goed()" style="background:green;color:white;">Goed</button>
<button onclick="fout()" style="background:red;color:white;">Fout</button>

<script>

let vragen = [

/* 🟢 MAKKELIJK */
{ vraag: "Wie is het schoolhoofd van Zweinstein?", antwoord: "Albus Dumbledore", level: "makkelijk" },
{ vraag: "Wat is Harry's uil?", antwoord: "Hedwig", level: "makkelijk" },
{ vraag: "In welk huis zit Draco?", antwoord: "Zwadderich", level: "makkelijk" },
{ vraag: "Wat is de sport op bezems?", antwoord: "Zwerkbal", level: "makkelijk" },

/* 🟡 MOEILIJK */
{ vraag: "Wat is de spreuk om iemand te ontwapenen?", antwoord: "Expelliarmus", level: "moeilijk" },
{ vraag: "Wie gaf Harry de Onzichtbaarheidsmantel?", antwoord: "Albus Dumbledore", level: "moeilijk" },
{ vraag: "Wat is de naam van de gevangenis?", antwoord: "Azkaban", level: "moeilijk" },
{ vraag: "Wie doodde Bellatrix van Detta?", antwoord: "Molly Wemel", level: "moeilijk" },
{ vraag: "Wat is de naam van de draak in de Vuurbeker?", antwoord: "Hongaarse Hoornstaart", level: "moeilijk" },
{ vraag: "Hoe heet de kaart die alle mensen toont?", antwoord: "De Sluipwegwijzer", level: "moeilijk" },

/* 🔴 EXTREEM */
{ vraag: "Wat is de volledige naam van Voldemort?", antwoord: "Tom Marvolo Riddle", level: "extreem" },
{ vraag: "Hoeveel horcruxes maakte Voldemort?", antwoord: "7", level: "extreem" },
{ vraag: "Wat is de naam van Regulus Zwarts' huiself?", antwoord: "Kreacher", level: "extreem" },
{ vraag: "Wie stal het echte medaillon van Zwadderich?", antwoord: "Regulus Zwarts", level: "extreem" },
{ vraag: "Wat is de spreuk voor de Patronus van Harry?", antwoord: "Expecto Patronum", level: "extreem" },
{ vraag: "Wie was de Halfbloed Prins?", antwoord: "Severus Sneep", level: "extreem" },
{ vraag: "Wat is de naam van Aragog's kolonie?", antwoord: "Het Verboden Bos", level: "extreem" },
{ vraag: "Wie opende de Geheime Kamer voor de tweede keer?", antwoord: "Ginny Wemel (onder controle van Riddle)", level: "extreem" },
{ vraag: "Welke vloek doodt direct?", antwoord: "Avada Kedavra", level: "extreem" },
{ vraag: "Wat is de naam van de school in Beauxbatons?", antwoord: "Beauxbatons Academie", level: "extreem" },

/* 🔥 EXTRA MOEILIJK */
{ vraag: "Wat is de naam van de minister van Toverkunst in boek 5?", antwoord: "Cornelius Droebel", level: "extreem" },
{ vraag: "Wie verving Droebel?", antwoord: "Rufus Schobbejak", level: "extreem" },
{ vraag: "Wat is de naam van de winkel van de Wemels?", antwoord: "Wemels' Tovenaarsgrappen", level: "moeilijk" },
{ vraag: "Welke professor geeft Waarzeggerij?", antwoord: "Sybill Zwamdrift", level: "moeilijk" },
{ vraag: "Wie bewaakt Azkaban?", antwoord: "Dementors", level: "moeilijk" },
{ vraag: "Wat drink je voor geluk?", antwoord: "Felix Fortunatix", level: "moeilijk" },

/* 💥 NOG MEER */
{ vraag: "Wat is de naam van Harry's zoon?", antwoord: "Albus Severus Potter", level: "moeilijk" },
{ vraag: "Wie trouwt met Ron?", antwoord: "Hermelien Griffel", level: "makkelijk" },
{ vraag: "Wie trouwt met Harry?", antwoord: "Ginny Wemel", level: "makkelijk" },
{ vraag: "Wat is de naam van de feniks van Dumbledore?", antwoord: "Fawkes", level: "moeilijk" },
{ vraag: "Welke bal wordt gebruikt om te scoren bij Zwerkbal?", antwoord: "De Slurk", level: "moeilijk" },
{ vraag: "Wat is de naam van de bewaker van de sleutel?", antwoord: "Hagrid", level: "makkelijk" }

];

let huidigeVraag = null;
let scoreGoed = 0;
let totaal = 0;

function nieuweVraag() {
    const randomIndex = Math.floor(Math.random() * vragen.length);
    huidigeVraag = vragen[randomIndex];

    document.getElementById("vraag").innerText =
        "[" + huidigeVraag.level.toUpperCase() + "] " + huidigeVraag.vraag;

    document.getElementById("antwoord").innerText = "";
    document.getElementById("antwoordKnop").style.display = "inline-block";
}

function toonAntwoord() {
    document.getElementById("antwoord").innerText = huidigeVraag.antwoord;
}

function goed() {
    if (!huidigeVraag) return;
    scoreGoed++;
    totaal++;
    updateScore();
    nieuweVraag();
}

function fout() {
    if (!huidigeVraag) return;
    totaal++;
    updateScore();
    nieuweVraag();
}

function updateScore() {
    document.getElementById("score").innerText =
        "Score: " + scoreGoed + " / " + totaal;
}

</script>

</body>
</html>
